name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: |
            Welcome. Thanks for opening your first issue in this repository.

            We'll review it as soon as possible. In the meantime:
            - Check if there is a similar issue already open.
            - Add steps to reproduce, expected behavior, and environment details.
            - Note whether the report concerns the CLI tools, Python API, or design docs.
          pr_message: |
            Welcome. Thanks for your first pull request in this repository.

            A maintainer will review it soon. Please make sure:
            - [ ] Tests cover the changed behavior.
            - [ ] Documentation is updated if the public API or CLI changed.
            - [ ] The PR description explains what changed and why.
